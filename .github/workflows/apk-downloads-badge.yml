name: Update APK downloads badge

on:
  release:
    types: [published]
  schedule:
    # Refresh every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch total APK download count
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count all .apk assets across all releases (case-insensitive)
          TOTAL=$(gh api \
            --paginate \
            "repos/${{ github.repository }}/releases" \
            --jq '[.[].assets[] | select(.name | ascii_downcase | endswith(".apk")) | .download_count] | add // 0' \
            | paste -sd+ - | bc)
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Write badge JSON
        run: |
          mkdir -p .github/badges
          cat > .github/badges/apk-downloads.json << EOF
          {
            "schemaVersion": 1,
            "label": "APK downloads",
            "message": "${{ steps.count.outputs.total }}",
            "color": "3ddc84"
          }
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/apk-downloads.json
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore: update APK downloads badge [skip ci]"
          git push
